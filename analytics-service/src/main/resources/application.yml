server:
  port: 8084

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5433/incident_db
    username: erp_user
    password: erp_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

