server:
  port: 8082

spring:
  application:
    name: incident-service

  datasource:
    url: jdbc:postgresql://localhost:5433/incident_db
    username: erp_user
    password: erp_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: erp_user
    password: erp_pass

