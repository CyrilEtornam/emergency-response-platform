server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:erp_user}
    password: ${DB_PASSWORD:erp_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db


  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:erp_user}
    password: ${RABBITMQ_PASSWORD:erp_pass}

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiry-ms: 900000        # 15 minutes
  refresh-expiry-ms: 604800000  # 7 days

rabbitmq:
  exchange: erp.events
  routing-keys:
    user-created: user.created
    role-changed: user.role_changed